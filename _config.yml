title: themobiusstrip's Learning Log
description: Notes on what I'm learning — code, systems, and everything in between.
url: "https://themobiusstrip.github.io"
baseurl: ""

theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-redirect-from

# minima theme settings
minima:
  date_format: "%Y-%m-%d"

header_pages:
  - posts.md
  - about.md

# Repository-only agent guidance; do not publish it as site content.
exclude:
  - AGENTS.md
  - CLAUDE.md

# Show excerpts on the home page post list
show_excerpts: true
