<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 444" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>agentpay-guard deployed through agentpay-proxy</title>
  <desc>Claude receives paid_fetch and no key. The supporting agentpay-proxy wrapper deploys agentpay-guard before its local testnet signer. The guard enforces the tested payment envelope, per-payment maximum, rolling budget, authorization lifetime, and duplicate-authorization policy. SQLite preserves budget, lifecycle, and duplicate state across restarts. Only a PASS reaches the signer, which signs the EIP-3009 authorization; a FAIL returns a refusal. The testnet website settles USDC on Base Sepolia and returns content through the proxy.</desc>

  <defs>
    <marker id="a-grey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
    <marker id="a-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#337ab7"/>
    </marker>
    <marker id="a-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3d8a68"/>
    </marker>
    <marker id="a-gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b8912f"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="444" rx="10" fill="#ffffff"/>

  <!-- ⑦ return path (fills the lower-left; content leaves the PROXY, not the signer) -->
  <path d="M 426 384 L 426 416 L 118 416 L 118 212" fill="none" stroke="#3d8a68" stroke-width="2.2" stroke-dasharray="7 5" marker-end="url(#a-green)"/>
  <text x="272" y="410" font-size="15" fill="#3d8a68" text-anchor="middle" font-weight="500" paint-order="stroke" stroke="#ffffff" stroke-width="6" stroke-linejoin="round">⑦ content back to Claude</text>

  <!-- ===== Claude (top band, flow axis y=160) ===== -->
  <rect x="24" y="108" width="164" height="104" rx="10" fill="#f7f8fa" stroke="#c8ccd2" stroke-width="1.5"/>
  <text x="42" y="145" font-size="21" font-weight="600" fill="#111827">Claude</text>
  <rect x="42" y="157" width="104" height="25" rx="12" fill="#eef1f4" stroke="#c8ccd2"/>
  <text x="94" y="175" font-size="13.5" fill="#4b5563" text-anchor="middle">holds no key</text>
  <text x="42" y="201" font-size="13.5" fill="#4b5563">asks proxy to fetch</text>

  <!-- ① Claude → Proxy -->
  <line x1="188" y1="160" x2="256" y2="160" stroke="#6b7280" stroke-width="2.6" marker-end="url(#a-grey)"/>
  <text x="222" y="150" font-size="14" fill="#374151" text-anchor="middle" paint-order="stroke" stroke="#ffffff" stroke-width="6" stroke-linejoin="round">①</text>
  <text x="222" y="176" font-size="11" fill="#374151" text-anchor="middle" font-family="SFMono-Regular, Menlo, Consolas, monospace" paint-order="stroke" stroke="#ffffff" stroke-width="6" stroke-linejoin="round">paid_fetch</text>

  <!-- ===== agentpay-proxy deployment wrapper ===== -->
  <rect x="256" y="48" width="340" height="336" rx="10" fill="#ffffff" stroke="#337ab7" stroke-width="2"/>
  <text x="276" y="80" font-size="19" font-weight="600" fill="#111827">agentpay-proxy</text>
  <text x="458" y="80" font-size="11.5" fill="#6b7280">deployment wrapper</text>

  <!-- guard sub-box: the checks -->
  <rect x="274" y="94" width="304" height="150" rx="8" fill="#f4f9fd" stroke="#337ab7" stroke-width="1.2"/>
  <text x="290" y="121" font-size="15.5" font-weight="700" fill="#2a6296">agentpay-guard · main artifact</text>
  <text x="290" y="151" font-size="14.5" fill="#1f2937">✓ tested envelope</text>
  <text x="436" y="151" font-size="14.5" fill="#1f2937">✓ max per payment</text>
  <text x="290" y="179" font-size="14.5" fill="#1f2937">✓ rolling budget</text>
  <text x="436" y="179" font-size="14.5" fill="#1f2937">✓ auth lifetime</text>
  <text x="290" y="207" font-size="14.5" fill="#1f2937">✓ duplicate guard</text>
  <text x="290" y="232" font-size="11.5" fill="#4b5563">SQLite: restart-safe budget · lifecycle · dedup</text>

  <!-- decision: PASS flows down into the signer; FAIL dead-ends -->
  <text x="290" y="265" font-size="15" font-weight="700" fill="#2f7a5a">PASS</text>
  <line x1="300" y1="271" x2="300" y2="284" stroke="#b8912f" stroke-width="2.2" marker-end="url(#a-gold)"/>
  <text x="392" y="265" font-size="15" font-weight="700" fill="#a63d36">FAIL</text>
  <text x="434" y="265" font-size="14" fill="#1f2937">→ refuse, tell Claude</text>

  <!-- signer / wallet sub-box (bottom band): local testnet CLI signer -->
  <rect x="274" y="284" width="304" height="84" rx="8" fill="#fbf7ef" stroke="#c9a94e" stroke-width="1.4"/>
  <text x="290" y="307" font-size="15" font-weight="600" fill="#8a6d1e">🔑  signer — EIP-3009 on PASS</text>
  <text x="290" y="329" font-size="13" fill="#6b5a2e">local testnet key in proxy process</text>
  <text x="290" y="348" font-size="13" fill="#6b5a2e">Claude receives paid_fetch only</text>
  <text x="290" y="364" font-size="11.5" font-style="italic" fill="#8a7a52">isolate proxy host from agent shell access</text>

  <!-- ===== channel Proxy ⇄ Website (flow axis, centre x=658) ===== -->
  <line x1="596" y1="106" x2="720" y2="106" stroke="#6b7280" stroke-width="2.2" marker-end="url(#a-grey)"/>
  <line x1="720" y1="142" x2="596" y2="142" stroke="#6b7280" stroke-width="2.2" marker-end="url(#a-grey)"/>
  <line x1="596" y1="178" x2="720" y2="178" stroke="#337ab7" stroke-width="2.2" marker-end="url(#a-blue)"/>
  <line x1="720" y1="214" x2="596" y2="214" stroke="#3d8a68" stroke-width="2.2" marker-end="url(#a-green)"/>
  <text x="658" y="98" font-size="14.5" fill="#374151" text-anchor="middle" paint-order="stroke" stroke="#ffffff" stroke-width="6" stroke-linejoin="round">② GET url</text>
  <text x="658" y="134" font-size="14.5" fill="#374151" text-anchor="middle" paint-order="stroke" stroke="#ffffff" stroke-width="6" stroke-linejoin="round">③ 402 + price</text>
  <text x="658" y="170" font-size="14.5" fill="#2a6296" font-weight="600" text-anchor="middle" paint-order="stroke" stroke="#ffffff" stroke-width="6" stroke-linejoin="round">④ signed retry</text>
  <text x="658" y="206" font-size="14.5" fill="#2f7a5a" font-weight="600" text-anchor="middle" paint-order="stroke" stroke="#ffffff" stroke-width="6" stroke-linejoin="round">⑥ 200 + content</text>

  <!-- ===== Paid website (top band, aligned with Claude at y=160) ===== -->
  <rect x="720" y="104" width="160" height="112" rx="10" fill="#f7f8fa" stroke="#c8ccd2" stroke-width="1.5"/>
  <text x="740" y="140" font-size="18" font-weight="600" fill="#111827">Paid website</text>
  <text x="740" y="165" font-size="13" fill="#6b7280">an x402 merchant</text>
  <text x="740" y="184" font-size="13" fill="#6b7280">returns 402 first</text>

  <!-- ⑤ Website → Base Sepolia -->
  <line x1="800" y1="216" x2="800" y2="252" stroke="#6b7280" stroke-width="2.2" marker-end="url(#a-grey)"/>
  <text x="812" y="238" font-size="12.5" fill="#374151" paint-order="stroke" stroke="#ffffff" stroke-width="5" stroke-linejoin="round">⑤ settle</text>

  <!-- ===== Base Sepolia (bottom band, aligned with the signer) ===== -->
  <rect x="720" y="252" width="160" height="112" rx="10" fill="#f7f8fa" stroke="#c8ccd2" stroke-width="1.5"/>
  <text x="740" y="288" font-size="18" font-weight="600" fill="#111827">Base Sepolia</text>
  <text x="740" y="313" font-size="13" fill="#6b7280">the testnet chain</text>
  <text x="740" y="332" font-size="13" fill="#6b7280">where the USDC</text>
  <text x="740" y="350" font-size="13" fill="#6b7280">actually settles</text>
</svg>
