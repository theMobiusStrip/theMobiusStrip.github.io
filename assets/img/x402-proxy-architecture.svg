<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 452" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>agentpay-proxy architecture: Claude, proxy with spending guard, paid website, Base Sepolia</title>
  <desc>Numbered flow. (1) Claude asks the proxy to fetch a URL — it holds no key. (2) The proxy GETs the URL and (3) receives an HTTP 402 with the price. Its spending guard checks payee, amount, budget, and duplicates: on PASS it signs an EIP-3009 authorization, on FAIL it refuses and tells Claude. (4) The proxy retries with the signed payment; (5) the paid website settles it on Base Sepolia, the testnet chain where the USDC actually moves; (6) the website returns 200 with the content to the proxy. (7) The proxy passes the content back to Claude. Claude only ever talks to the proxy, so every payment and every response passes through the guard.</desc>

  <defs>
    <marker id="a-grey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
    <marker id="a-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#337ab7"/>
    </marker>
    <marker id="a-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3d8a68"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="452" rx="10" fill="#ffffff"/>

  <!-- ⑦ return path (behind everything): content leaves the PROXY (not the chain) and goes to Claude -->
  <path d="M 426 388 L 426 424 L 118 424 L 118 277" fill="none" stroke="#3d8a68" stroke-width="2.2" stroke-dasharray="7 5" marker-end="url(#a-green)"/>
  <text x="272" y="418" font-size="15" fill="#3d8a68" text-anchor="middle" font-weight="500" paint-order="stroke" stroke="#ffffff" stroke-width="6" stroke-linejoin="round">⑦ content back to Claude</text>

  <!-- ===== Claude (centred on flow axis y=221) ===== -->
  <rect x="24" y="165" width="164" height="112" rx="10" fill="#f7f8fa" stroke="#c8ccd2" stroke-width="1.5"/>
  <text x="42" y="203" font-size="22" font-weight="600" fill="#111827">Claude</text>
  <rect x="42" y="215" width="104" height="26" rx="13" fill="#eef1f4" stroke="#c8ccd2"/>
  <text x="94" y="234" font-size="14" fill="#4b5563" text-anchor="middle">holds no key</text>
  <text x="42" y="264" font-size="14" fill="#4b5563">asks proxy to fetch</text>

  <!-- ① Claude → Proxy (paid_fetch labels the arrow in the widened gap) -->
  <line x1="188" y1="221" x2="256" y2="221" stroke="#6b7280" stroke-width="2.6" marker-end="url(#a-grey)"/>
  <text x="222" y="211" font-size="15" fill="#374151" text-anchor="middle" paint-order="stroke" stroke="#ffffff" stroke-width="6" stroke-linejoin="round">①</text>
  <text x="222" y="237" font-size="11" fill="#374151" text-anchor="middle" font-family="SFMono-Regular, Menlo, Consolas, monospace" paint-order="stroke" stroke="#ffffff" stroke-width="6" stroke-linejoin="round">paid_fetch</text>

  <!-- ===== agentpay-proxy (guard raised so all 4 handshake arrows land on it) ===== -->
  <rect x="256" y="52" width="340" height="336" rx="10" fill="#ffffff" stroke="#337ab7" stroke-width="2"/>
  <text x="276" y="88" font-size="22" font-weight="600" fill="#111827">agentpay-proxy</text>
  <rect x="464" y="68" width="114" height="26" rx="13" fill="#e8f1f9" stroke="#9dc0dd"/>
  <text x="521" y="87" font-size="14" fill="#2a6296" text-anchor="middle">holds the key</text>

  <!-- guard sub-box -->
  <rect x="274" y="102" width="304" height="254" rx="8" fill="#f4f9fd" stroke="#337ab7" stroke-width="1.2"/>
  <text x="290" y="130" font-size="16" font-weight="600" fill="#2a6296">spending guard · every request</text>

  <text x="290" y="170" font-size="16" fill="#1f2937">✓ right payee</text>
  <text x="436" y="170" font-size="16" fill="#1f2937">✓ right amount</text>
  <text x="290" y="206" font-size="16" fill="#1f2937">✓ within budget</text>
  <text x="436" y="206" font-size="16" fill="#1f2937">✓ no duplicates</text>

  <line x1="290" y1="240" x2="562" y2="240" stroke="#d0e0ed" stroke-width="1"/>

  <text x="290" y="282" font-size="16" font-weight="700" fill="#2f7a5a">PASS</text>
  <text x="356" y="282" font-size="16" fill="#1f2937">→ sign EIP-3009</text>
  <text x="290" y="318" font-size="16" font-weight="700" fill="#a63d36">FAIL</text>
  <text x="356" y="318" font-size="16" fill="#1f2937">→ refuse, tell Claude</text>

  <!-- ===== channel Proxy ⇄ Website — 4 handshake steps, 36px apart (centre x=658) ===== -->
  <line x1="596" y1="108" x2="720" y2="108" stroke="#6b7280" stroke-width="2.2" marker-end="url(#a-grey)"/>
  <line x1="720" y1="144" x2="596" y2="144" stroke="#6b7280" stroke-width="2.2" marker-end="url(#a-grey)"/>
  <line x1="596" y1="180" x2="720" y2="180" stroke="#337ab7" stroke-width="2.2" marker-end="url(#a-blue)"/>
  <line x1="720" y1="216" x2="596" y2="216" stroke="#3d8a68" stroke-width="2.2" marker-end="url(#a-green)"/>
  <text x="658" y="100" font-size="15" fill="#374151" text-anchor="middle" paint-order="stroke" stroke="#ffffff" stroke-width="6" stroke-linejoin="round">② GET url</text>
  <text x="658" y="136" font-size="15" fill="#374151" text-anchor="middle" paint-order="stroke" stroke="#ffffff" stroke-width="6" stroke-linejoin="round">③ 402 + price</text>
  <text x="658" y="172" font-size="15" fill="#2a6296" font-weight="600" text-anchor="middle" paint-order="stroke" stroke="#ffffff" stroke-width="6" stroke-linejoin="round">④ signed retry</text>
  <text x="658" y="208" font-size="15" fill="#2f7a5a" font-weight="600" text-anchor="middle" paint-order="stroke" stroke="#ffffff" stroke-width="6" stroke-linejoin="round">⑥ 200 + content</text>

  <!-- ===== Paid website (upper right) ===== -->
  <rect x="720" y="98" width="160" height="128" rx="10" fill="#f7f8fa" stroke="#c8ccd2" stroke-width="1.5"/>
  <text x="740" y="137" font-size="18" font-weight="600" fill="#111827">Paid website</text>
  <text x="740" y="163" font-size="13" fill="#6b7280">an x402 merchant</text>
  <text x="740" y="182" font-size="13" fill="#6b7280">replies 402</text>
  <text x="740" y="200" font-size="13" fill="#6b7280">until paid</text>

  <!-- ⑤ Website → Base Sepolia (shared vertical axis x=800) -->
  <line x1="800" y1="226" x2="800" y2="274" stroke="#6b7280" stroke-width="2.2" marker-end="url(#a-grey)"/>
  <text x="812" y="254" font-size="13" fill="#374151" paint-order="stroke" stroke="#ffffff" stroke-width="5" stroke-linejoin="round">⑤ settle</text>

  <!-- ===== Base Sepolia (lower right; bottom aligns with the proxy) ===== -->
  <rect x="720" y="274" width="160" height="128" rx="10" fill="#f7f8fa" stroke="#c8ccd2" stroke-width="1.5"/>
  <text x="740" y="313" font-size="18" font-weight="600" fill="#111827">Base Sepolia</text>
  <text x="740" y="339" font-size="13" fill="#6b7280">the testnet chain</text>
  <text x="740" y="358" font-size="13" fill="#6b7280">where the USDC</text>
  <text x="740" y="376" font-size="13" fill="#6b7280">actually settles</text>
</svg>
